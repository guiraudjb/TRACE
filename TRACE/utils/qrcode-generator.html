<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur - Planche Avery 37x37-S</title>
    <script src="../qrcode.min.js"></script>
    <style>
        :root {
            --blue-france: #000091;
            --bg-color: #f0f0f0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- PANNEAU DE CONTRÔLE ET INSTRUCTIONS --- */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .instructions {
            background: #fff3cd;
            color: #856404;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            margin-bottom: 20px;
            max-width: 600px;
            font-size: 0.9em;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 120px;
        }

        button {
            padding: 10px 20px;
            background-color: var(--blue-france);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 18px;
        }

        button.btn-print { background-color: #4CAF50; }
        button:hover { opacity: 0.9; }

        /* --- ZONE DE RENDU : FORMAT AVERY 37x37-S --- */
        #printArea {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Espace entre les pages à l'écran */
        }

        .page-a4 {
            background: white;
            width: 210mm;
            height: 297mm;
            /* Marges calculées pour centrer 5x7 étiquettes de 37mm sur du A4 */
            padding-top: 19mm;
            padding-bottom: 19mm;
            padding-left: 12.5mm;
            padding-right: 12.5mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            box-sizing: border-box;
            
            /* Grille stricte : 5 colonnes x 7 lignes */
            display: grid;
            grid-template-columns: repeat(5, 37mm);
            grid-template-rows: repeat(7, 37mm);
            gap: 0; /* Pas d'espacement entre les étiquettes dans ce standard */
            page-break-after: always; /* Force un saut de page lors de l'impression */
        }

        .label {
            width: 37mm;
            height: 37mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            outline: 1px dashed #e0e0e0; /* Repère visuel léger pour l'écran */
            outline-offset: -1px;
            overflow: hidden;
        }

        .label-text {
            margin-top: 2px;
            font-family: monospace;
            font-size: 8pt; /* Taille adaptée pour tenir dans 37mm */
            font-weight: bold;
            color: #000;
        }

        /* --- RÈGLES STRICTES POUR L'IMPRESSION --- */
        @media print {
            body {
                background-color: white;
                margin: 0;
                padding: 0;
            }
            .controls, .instructions {
                display: none !important; /* Masque l'interface */
            }
            #printArea {
                gap: 0; /* Supprime l'espace entre les pages */
            }
            .page-a4 {
                box-shadow: none;
                margin: 0;
            }
            .label {
                outline: none; /* Supprime les bordures pointillées à l'impression */
            }
            @page {
                size: A4;
                margin: 0; /* Désactive les marges du navigateur, .page-a4 prend le relais */
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="input-group">
            <label for="startNum">Premier numéro :</label>
            <input type="number" id="startNum" value="1" min="0">
        </div>
        <div class="input-group">
            <label for="qty">Quantité d'étiquettes :</label>
            <input type="number" id="qty" value="35" min="1">
        </div>
        <button onclick="genererPlanche()">Générer</button>
        <button class="btn-print" onclick="window.print()">Imprimer</button>
    </div>

    <div class="instructions">
        <strong>Avant d'imprimer :</strong> Dans les paramètres d'impression de votre navigateur, assurez-vous que la <strong>Mise à l'échelle est sur 100% (Taille réelle)</strong> et que les <strong>Marges sont définies sur "Aucune"</strong>.
    </div>

    <div id="printArea">
        </div>

    <script>
        function genererPlanche() {
            const startNum = parseInt(document.getElementById('startNum').value, 10);
            const qty = parseInt(document.getElementById('qty').value, 10);
            const printArea = document.getElementById('printArea');
            
            printArea.innerHTML = ''; // Nettoyage de la zone

            const labelsPerPage = 35; // 5 colonnes x 7 lignes
            const totalPages = Math.ceil(qty / labelsPerPage);
            
            let currentLabelCount = 0;

            for (let p = 0; p < totalPages; p++) {
                // Création d'une nouvelle feuille A4
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page-a4';
                
                for (let i = 0; i < labelsPerPage; i++) {
                    if (currentLabelCount >= qty) break; // Arrêt si la quantité est atteinte
                    
                    const currentNum = startNum + currentLabelCount;
                    const formattedText = `MOB-${String(currentNum).padStart(6, '0')}`;

                    // Conteneur de l'étiquette (37x37mm)
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'label';

                    const qrContainer = document.createElement('div');
                    
                    const textDiv = document.createElement('div');
                    textDiv.className = 'label-text';
                    textDiv.innerText = formattedText;

                    labelDiv.appendChild(qrContainer);
                    labelDiv.appendChild(textDiv);
                    pageDiv.appendChild(labelDiv);

                    // Génération du QR Code (Taille : 85x85 pixels pour rentrer dans les 37mm)
                    new QRCode(qrContainer, {
                        text: formattedText,
                        width: 85,  
                        height: 85, 
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });

                    currentLabelCount++;
                }
                printArea.appendChild(pageDiv);
            }
        }

        // Générer une planche au chargement
        window.onload = genererPlanche;
    </script>

</body>
</html>
