<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur QR Pro - Position de Logo Flexible</title>
    <script src="./qr-code-styling.js"></script>
    <style>
        :root { --blue-france: #000091; --bg-main: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- INTERFACE DE CONTRÔLE --- */
        .admin-panel {
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 1100px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .section { border-top: 4px solid var(--blue-france); padding-top: 15px; }
        .section h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--blue-france); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        label { font-size: 0.85rem; font-weight: 600; color: #555; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; }
        
        .color-group { display: flex; gap: 5px; align-items: center; }
        .color-group input[type="text"] { width: 80px; text-transform: uppercase; font-family: monospace; }
        input[type="color"] { width: 35px; height: 35px; padding: 0; border: none; cursor: pointer; background: none; }

        .full-width { grid-column: 1 / -1; display: flex; justify-content: center; gap: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        button { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; }
        .btn-gen { background: var(--blue-france); color: white; }
        .btn-print { background: #2e7d32; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); opacity: 0.9; }

        /* --- ZONE DE RENDU --- */
        #printArea { display: flex; flex-direction: column; gap: 20px; }
        
        .page-a4 {
            background: white; width: 210mm; height: 297mm;
            display: grid; box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); page-break-after: always;
            overflow: hidden;
        }

        .label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            outline: 1px dashed #eee; box-sizing: border-box; overflow: hidden;
            padding: 1mm;
        }

        /* Conteneur pour le mode "Logo à gauche" */
        .label-row {
            display: flex; flex-direction: row; align-items: center; justify-content: space-around;
            width: 100%; height: 85%;
        }

        .logo-box { display: flex; align-items: center; justify-content: center; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .label-text { margin-top: 1mm; font-family: monospace; font-weight: bold; text-align: center; line-height: 1; }

        @media print {
            body { background: white; padding: 0; }
            .admin-panel { display: none !important; }
            .page-a4 { box-shadow: none; margin: 0; }
            .label { outline: none; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <div class="section">
            <h3>1. Contenu</h3>
            <div class="field"><label>Préfixe</label><input type="text" id="prefix" value="MOB-"></div>
            <div class="field">
                <label>Début / Quantité</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="start" value="1" style="width:50%">
                    <input type="number" id="qty" value="35" style="width:50%">
                </div>
            </div>
            <div class="field">
                <label>Niveau Correction</label>
                <select id="ecc">
                    <option value="L">L (7%)</option><option value="M">M (15%)</option>
                    <option value="Q">Q (25%)</option><option value="H" selected>H (30%)</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h3>2. Style QR</h3>
            <div class="field">
                <label>Forme Points</label>
                <select id="dotType">
                    <option value="square">Carré</option><option value="rounded">Arrondi</option>
                    <option value="dots" selected>Points</option><option value="extra-rounded">Gouttes</option>
                </select>
            </div>
            <div class="field">
                <label>Couleurs Hex</label>
                <div class="color-group"><input type="color" id="c1p" value="#000000"><input type="text" id="c1h" value="#000000"></div>
                <div class="color-group"><input type="color" id="c2p" value="#000091"><input type="text" id="c2h" value="#000091"></div>
            </div>
        </div>

        <div class="section">
            <h3>3. Logo</h3>
            <div class="field">
                <label>Position du logo</label>
                <select id="logoPos">
                    <option value="embedded">Incrusté au centre</option>
                    <option value="left">À gauche du QR</option>
                </select>
            </div>
            <div class="field">
                <label>Fichier image</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
            <div class="field">
                <label>Taille du logo (%)</label>
                <input type="range" id="logoScale" min="0.1" max="0.5" step="0.05" value="0.3">
            </div>
        </div>

        <div class="section">
            <h3>4. Mise en page</h3>
            <div class="field">
                <label>Cols / Lignes</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="nbCols" value="5">
                    <input type="number" id="nbRows" value="7">
                </div>
            </div>
            <div class="field">
                <label>Marges Page (mm)</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="mTop" value="19" title="Haut">
                    <input type="number" id="mLeft" value="12.5" title="Gauche">
                </div>
            </div>
            <div class="field">
                <label>Taille Texte (pt)</label>
                <input type="number" id="textSize" value="7.5" step="0.5">
            </div>
        </div>

        <div class="full-width">
            <button class="btn-gen" onclick="genererPlanche()">Générer la planche</button>
            <button class="btn-print" onclick="window.print()">Imprimer</button>
        </div>
    </div>

    <div id="printArea"></div>

    <script>
        let logoData = "TRACE.png";

        function setupColor(pId, hId) {
            const p = document.getElementById(pId); const h = document.getElementById(hId);
            p.addEventListener('input', () => h.value = p.value.toUpperCase());
            h.addEventListener('input', () => { if(/^#[0-9A-F]{6}$/i.test(h.value)) p.value = h.value; });
        }
        setupColor('c1p', 'c1h'); setupColor('c2p', 'c2h');

        document.getElementById('logoFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { logoData = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        });

        async function genererPlanche() {
            const area = document.getElementById('printArea');
            area.innerHTML = '';

            const cols = parseInt(document.getElementById('nbCols').value);
            const rows = parseInt(document.getElementById('nbRows').value);
            const mTop = parseFloat(document.getElementById('mTop').value);
            const mLeft = parseFloat(document.getElementById('mLeft').value);
            const qty = parseInt(document.getElementById('qty').value);
            const start = parseInt(document.getElementById('start').value);
            const prefix = document.getElementById('prefix').value;
            const logoPos = document.getElementById('logoPos').value;
            const logoScale = parseFloat(document.getElementById('logoScale').value);
            const tSize = document.getElementById('textSize').value;

            const availW = 210 - (mLeft * 2);
            const availH = 297 - (mTop * 2);
            const cellW = availW / cols;
            const cellH = availH / rows;

            let count = 0;
            const labelsPerPage = cols * rows;
            const pagesNeeded = Math.ceil(qty / labelsPerPage);

            for (let p = 0; p < pagesNeeded; p++) {
                const page = document.createElement('div');
                page.className = 'page-a4';
                page.style.padding = `${mTop}mm ${mLeft}mm`;
                page.style.gridTemplateColumns = `repeat(${cols}, ${cellW}mm)`;
                page.style.gridTemplateRows = `repeat(${rows}, ${cellH}mm)`;
                
                for (let i = 0; i < labelsPerPage && count < qty; i++) {
                    const val = prefix + String(start + count).padStart(6, '0');
                    const label = document.createElement('div');
                    label.className = 'label';
                    label.style.width = `${cellW}mm`;
                    label.style.height = `${cellH}mm`;
                    
                    let qrSizePx;
                    let qrCont = document.createElement('div');

                    // --- LOGIQUE DE POSITIONNEMENT ---
                    if (logoPos === 'left') {
                        const row = document.createElement('div');
                        row.className = 'label-row';
                        
                        const logoBox = document.createElement('div');
                        logoBox.className = 'logo-box';
                        logoBox.style.width = '35%'; // Espace pour le logo
                        const img = document.createElement('img');
                        img.src = logoData;
                        logoBox.appendChild(img);
                        
                        const qrBox = document.createElement('div');
                        qrBox.style.width = '60%'; // Espace pour le QR
                        qrBox.appendChild(qrCont);
                        
                        row.appendChild(logoBox);
                        row.appendChild(qrBox);
                        label.appendChild(row);

                        // Calcul taille QR réduit pour tenir à côté du logo
                        qrSizePx = Math.round((cellW * 0.55) * 3.78); 
                    } else {
                        label.appendChild(qrCont);
                        // Taille QR normale (plein pot)
                        qrSizePx = Math.round(Math.min(cellW, cellH) * 0.8 * 3.78);
                    }

                    const txt = document.createElement('div');
                    txt.className = 'label-text';
                    txt.style.fontSize = `${tSize}pt`;
                    txt.innerText = val;
                    label.appendChild(txt);
                    page.appendChild(label);

                    // --- CONFIGURATION DU QR ---
                    const qrConfig = {
                        width: qrSizePx, height: qrSizePx,
                        data: val,
                        qrOptions: { errorCorrectionLevel: document.getElementById('ecc').value },
                        dotsOptions: {
                            type: document.getElementById('dotType').value,
                            gradient: {
                                type: "linear", rotation: 0.78,
                                colorStops: [{ offset: 0, color: document.getElementById('c1h').value }, 
                                            { offset: 1, color: document.getElementById('c2h').value }]
                            }
                        },
                        cornersSquareOptions: { type: "extra-rounded", color: document.getElementById('c1h').value },
                        cornersDotOptions: { type: "dot", color: document.getElementById('c2h').value },
                        backgroundOptions: { color: "#ffffff" }
                    };

                    // Ajouter le logo incrusté seulement si l'option est choisie
                    if (logoPos === 'embedded') {
                        qrConfig.image = logoData;
                        qrConfig.imageOptions = { imageSize: logoScale, margin: 2, hideBackgroundDots: true };
                    }

                    const qr = new QRCodeStyling(qrConfig);
                    qr.append(qrCont);
                    count++;
                }
                area.appendChild(page);
            }
        }
        window.onload = genererPlanche;
    </script>
</body>
</html>
