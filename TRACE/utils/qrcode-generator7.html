<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur QR Pro - Personnalisation Totale</title>
    <script src="./qr-code-styling.js"></script>
    <style>
        :root { --blue-france: #000091; --bg-main: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- INTERFACE DE CONTRÔLE --- */
        .admin-panel {
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 1100px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .section { border-top: 4px solid var(--blue-france); padding-top: 15px; }
        .section h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--blue-france); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        label { font-size: 0.85rem; font-weight: 600; color: #555; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; }
        
        .color-group { display: flex; gap: 5px; align-items: center; }
        .color-group input[type="text"] { width: 80px; text-transform: uppercase; font-family: monospace; }
        input[type="color"] { width: 35px; height: 35px; padding: 0; border: none; cursor: pointer; background: none; }

        .full-width { grid-column: 1 / -1; display: flex; justify-content: center; gap: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        button { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; }
        .btn-gen { background: var(--blue-france); color: white; }
        .btn-print { background: #2e7d32; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); opacity: 0.9; }

        /* --- RENDU --- */
        #printArea { display: flex; flex-direction: column; gap: 20px; }
        .page-a4 {
            background: white; width: 210mm; height: 297mm; padding: 19mm 12.5mm;
            display: grid; grid-template-columns: repeat(5, 37mm); grid-template-rows: repeat(7, 37mm);
            box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.1); page-break-after: always;
        }
        .label {
            width: 37mm; height: 37mm; display: flex; flex-direction: column; align-items: center; justify-content: center;
            outline: 1px dashed #eee; box-sizing: border-box; overflow: hidden;
        }
        .label-text { margin-top: 1mm; font-family: monospace; font-size: 7.5pt; font-weight: bold; }

        @media print {
            body { background: white; padding: 0; }
            .admin-panel, .instructions { display: none !important; }
            .page-a4 { box-shadow: none; margin: 0; }
            .label { outline: none; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <div class="section">
            <h3>1. Contenu</h3>
            <div class="field">
                <label>Préfixe</label>
                <input type="text" id="prefix" value="MOB-">
            </div>
            <div class="field">
                <label>Début / Quantité</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="start" value="1" style="width:50%">
                    <input type="number" id="qty" value="35" style="width:50%">
                </div>
            </div>
            <div class="field">
                <label>Correction d'erreur</label>
                <select id="ecc">
                    <option value="L">L (7%)</option>
                    <option value="M">M (15%)</option>
                    <option value="Q">Q (25%)</option>
                    <option value="H" selected>H (30% - Recommandé)</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h3>2. Style des Points</h3>
            <div class="field">
                <label>Forme</label>
                <select id="dotType">
                    <option value="square">Carré</option>
                    <option value="rounded">Arrondi</option>
                    <option value="dots" selected>Points</option>
                    <option value="classy">Élégant</option>
                    <option value="extra-rounded">Gouttes</option>
                </select>
            </div>
            <div class="field">
                <label>Couleurs (Dégradé)</label>
                <div class="color-group">
                    <input type="color" id="c1p" value="#000000">
                    <input type="text" id="c1h" value="#000000">
                </div>
                <div class="color-group">
                    <input type="color" id="c2p" value="#000091">
                    <input type="text" id="c2h" value="#000091">
                </div>
            </div>
            <div class="field">
                <label>Type de dégradé</label>
                <select id="gradType">
                    <option value="linear">Linéaire</option>
                    <option value="radial">Radial</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h3>3. Style des Coins</h3>
            <div class="field">
                <label>Contour (Square)</label>
                <select id="corSqType">
                    <option value="square">Carré</option>
                    <option value="extra-rounded" selected>Arrondi</option>
                    <option value="dot">Cercle</option>
                </select>
            </div>
            <div class="field">
                <label>Centre (Dot)</label>
                <select id="corDotType">
                    <option value="square">Carré</option>
                    <option value="dot" selected>Cercle</option>
                </select>
            </div>
            <div class="field">
                <label>Couleur Arrière-plan</label>
                <div class="color-group">
                    <input type="color" id="bgp" value="#ffffff">
                    <input type="text" id="bgh" value="#FFFFFF">
                </div>
            </div>
        </div>

        <div class="section">
            <h3>4. Logo central</h3>
            <div class="field">
                <label>Fichier image</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
            <div class="field">
                <label>Taille / Marge</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="logoSize" value="0.3" step="0.1" min="0.1" max="0.5" title="Taille">
                    <input type="number" id="logoMargin" value="3" title="Marge">
                </div>
            </div>
            <div class="field" style="flex-direction:row; align-items:center; gap:10px; margin-top:10px">
                <input type="checkbox" id="hideDots" checked>
                <label for="hideDots">Masquer points derrière</label>
            </div>
        </div>

        <div class="section">
            <h3>5. Dimensions</h3>
            <div class="field">
                <label>Taille QR (px)</label>
                <input type="number" id="qrSize" value="115">
            </div>
            <div class="field">
                <label>Marge QR (Quiet Zone)</label>
                <input type="number" id="qrMargin" value="0">
            </div>
            <div class="field">
                <label>Rotation Dégradé (rad)</label>
                <input type="number" id="gradRot" value="0.78" step="0.1">
            </div>
        </div>

        <div class="full-width">
            <button class="btn-gen" onclick="genererPlanche()">Appliquer les réglages</button>
            <button class="btn-print" onclick="window.print()">Imprimer la planche</button>
        </div>
    </div>

    <div id="printArea"></div>

    <script>
        let logoData = "TRACE.png";

        // Synchro des couleurs
        function setupColor(pId, hId) {
            const p = document.getElementById(pId);
            const h = document.getElementById(hId);
            p.addEventListener('input', () => h.value = p.value.toUpperCase());
            h.addEventListener('input', () => { if(/^#[0-9A-F]{6}$/i.test(h.value)) p.value = h.value; });
        }
        setupColor('c1p', 'c1h'); setupColor('c2p', 'c2h'); setupColor('bgp', 'bgh');

        // Import Logo
        document.getElementById('logoFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => logoData = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        });

        async function genererPlanche() {
            const config = {
                prefix: document.getElementById('prefix').value,
                start: parseInt(document.getElementById('start').value),
                qty: parseInt(document.getElementById('qty').value),
                ecc: document.getElementById('ecc').value,
                dotType: document.getElementById('dotType').value,
                c1: document.getElementById('c1h').value,
                c2: document.getElementById('c2h').value,
                bg: document.getElementById('bgh').value,
                gradType: document.getElementById('gradType').value,
                rot: parseFloat(document.getElementById('gradRot').value),
                corSq: document.getElementById('corSqType').value,
                corDt: document.getElementById('corDotType').value,
                lSize: parseFloat(document.getElementById('logoSize').value),
                lMarg: parseInt(document.getElementById('logoMargin').value),
                hDots: document.getElementById('hideDots').checked,
                qSize: parseInt(document.getElementById('qrSize').value),
                qMarg: parseInt(document.getElementById('qrMargin').value)
            };

            const area = document.getElementById('printArea');
            area.innerHTML = '';
            
            let count = 0;
            const pages = Math.ceil(config.qty / 35);

            for (let p = 0; p < pages; p++) {
                const page = document.createElement('div');
                page.className = 'page-a4';
                
                for (let i = 0; i < 35 && count < config.qty; i++) {
                    const val = config.prefix + String(config.start + count).padStart(6, '0');
                    const label = document.createElement('div');
                    label.className = 'label';
                    
                    const qrCont = document.createElement('div');
                    const txt = document.createElement('div');
                    txt.className = 'label-text';
                    txt.innerText = val;

                    label.appendChild(qrCont);
                    label.appendChild(txt);
                    page.appendChild(label);

                    const qr = new QRCodeStyling({
                        width: config.qSize, height: config.qSize, margin: config.qMarg,
                        data: val,
                        qrOptions: { errorCorrectionLevel: config.ecc },
                        image: logoData,
                        dotsOptions: {
                            type: config.dotType,
                            gradient: {
                                type: config.gradType, rotation: config.rot,
                                colorStops: [{ offset: 0, color: config.c1 }, { offset: 1, color: config.c2 }]
                            }
                        },
                        backgroundOptions: { color: config.bg },
                        imageOptions: { imageSize: config.lSize, margin: config.lMarg, hideBackgroundDots: config.hDots },
                        cornersSquareOptions: { type: config.corSq, color: config.c1 },
                        cornersDotOptions: { type: config.corDt, color: config.c2 }
                    });
                    qr.append(qrCont);
                    count++;
                }
                area.appendChild(page);
            }
        }
        window.onload = genererPlanche;
    </script>
</body>
</html>
