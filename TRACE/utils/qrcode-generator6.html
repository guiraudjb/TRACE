<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur Avery 37x37 - Personnalisation Avancée</title>
    <script src="./qr-code-styling.js"></script>
    <style>
        :root {
            --blue-france: #000091;
            --bg-color: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- PANNEAU DE CONTRÔLE --- */
        .controls {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .control-section {
            border-left: 3px solid var(--blue-france);
            padding-left: 15px;
        }

        .control-section h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--blue-france);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        label { font-size: 0.85em; font-weight: 600; color: #444; }

        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        input[type="color"] {
            padding: 0;
            width: 38px;
            height: 35px;
            cursor: pointer;
        }

        .color-wrapper {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .hex-input {
            width: 75px;
            font-family: "Courier New", monospace;
            text-transform: uppercase;
        }

        .btn-group {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-top: 10px;
        }

        button {
            padding: 12px 25px;
            background-color: var(--blue-france);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        button.btn-print { background-color: #2e7d32; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- ZONE DE RENDU --- */
        #printArea { display: flex; flex-direction: column; gap: 20px; }

        .page-a4 {
            background: white;
            width: 210mm;
            height: 297mm;
            padding: 19mm 12.5mm;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(5, 37mm);
            grid-template-rows: repeat(7, 37mm);
            page-break-after: always;
        }

        .label {
            width: 37mm;
            height: 37mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            outline: 1px dashed #ddd;
            padding: 1mm;
            overflow: hidden;
        }

        .label-text {
            margin-top: 1mm;
            font-family: "Courier New", monospace;
            font-size: 7.5pt;
            font-weight: bold;
            color: #000;
        }

        @media print {
            body { background: none; padding: 0; }
            .controls, .instructions { display: none !important; }
            .page-a4 { box-shadow: none; margin: 0; }
            .label { outline: none; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-section">
            <h3>Données</h3>
            <div class="input-group">
                <label>Premier numéro :</label>
                <input type="number" id="startNum" value="1">
            </div>
            <div class="input-group">
                <label>Quantité :</label>
                <input type="number" id="qty" value="35">
            </div>
        </div>

        <div class="control-section">
            <h3>Design QR</h3>
            <div class="input-group">
                <label>Couleur 1 (Début dégradé) :</label>
                <div class="color-wrapper">
                    <input type="color" id="color1Picker" value="#000000">
                    <input type="text" id="color1Hex" class="hex-input" value="#000000" maxlength="7">
                </div>
            </div>
            <div class="input-group">
                <label>Couleur 2 (Fin dégradé) :</label>
                <div class="color-wrapper">
                    <input type="color" id="color2Picker" value="#000091">
                    <input type="text" id="color2Hex" class="hex-input" value="#000091" maxlength="7">
                </div>
            </div>
            <div class="input-group">
                <label>Forme des points :</label>
                <select id="dotStyle">
                    <option value="square">Carré</option>
                    <option value="rounded">Arrondi</option>
                    <option value="dots" selected>Points</option>
                    <option value="extra-rounded">Gouttes</option>
                </select>
            </div>
        </div>

        <div class="control-section">
            <h3>Logo Incrusté</h3>
            <div class="input-group">
                <label>Choisir un logo :</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
            <div class="input-group">
                <label>Taille logo (%) :</label>
                <input type="range" id="logoSize" min="0.1" max="0.5" step="0.05" value="0.3">
            </div>
            <div style="font-size: 0.75em; color: #666;">
                <input type="checkbox" id="clearBg" checked> Effacer fond derrière logo
            </div>
        </div>

        <div class="btn-group">
            <button onclick="genererPlanche()">Actualiser la planche</button>
            <button class="btn-print" onclick="window.print()">Imprimer en PDF / Papier</button>
        </div>
    </div>

    <div id="printArea"></div>

    <script>
        let customLogoData = "TRACE.png"; // Valeur par défaut

        // Synchronisation des champs couleurs (Sélecteur <-> Champ Hex)
        function syncColors(pickerId, hexId) {
            const picker = document.getElementById(pickerId);
            const hexInput = document.getElementById(hexId);

            // Quand on clique sur le sélecteur
            picker.addEventListener('input', (e) => {
                hexInput.value = e.target.value.toUpperCase();
            });

            // Quand on tape dans le champ texte
            hexInput.addEventListener('input', (e) => {
                let val = e.target.value;
                if (!val.startsWith('#')) val = '#' + val; // Ajoute le # si oublié
                if (/^#[0-9A-F]{6}$/i.test(val)) {
                    picker.value = val; // Met à jour le sélecteur si le code est valide
                }
            });
        }

        syncColors('color1Picker', 'color1Hex');
        syncColors('color2Picker', 'color2Hex');

        // Gestion du chargement de fichier logo
        document.getElementById('logoFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    customLogoData = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        async function genererPlanche() {
            const startNum = parseInt(document.getElementById('startNum').value, 10);
            const qty = parseInt(document.getElementById('qty').value, 10);
            
            // Récupération des couleurs depuis les champs texte (qui font foi)
            let color1 = document.getElementById('color1Hex').value;
            let color2 = document.getElementById('color2Hex').value;
            
            // Sécurisation basique si le champ est mal rempli
            if (!/^#[0-9A-F]{6}$/i.test(color1)) color1 = "#000000";
            if (!/^#[0-9A-F]{6}$/i.test(color2)) color2 = "#000091";

            const dotStyle = document.getElementById('dotStyle').value;
            const logoSize = parseFloat(document.getElementById('logoSize').value);
            const clearBg = document.getElementById('clearBg').checked;
            
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ''; 

            const labelsPerPage = 35; 
            const totalPages = Math.ceil(qty / labelsPerPage);
            let currentLabelCount = 0;

            for (let p = 0; p < totalPages; p++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page-a4';
                
                for (let i = 0; i < labelsPerPage; i++) {
                    if (currentLabelCount >= qty) break;
                    
                    const currentNum = startNum + currentLabelCount;
                    const formattedText = `MOB-${String(currentNum).padStart(6, '0')}`;

                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'label';

                    const qrContainer = document.createElement('div');
                    const textDiv = document.createElement('div');
                    textDiv.className = 'label-text';
                    textDiv.innerText = formattedText;

                    labelDiv.appendChild(qrContainer);
                    labelDiv.appendChild(textDiv);
                    pageDiv.appendChild(labelDiv);

                    // Configuration du QR Code
                    const qrCode = new QRCodeStyling({
                        width: 110,
                        height: 110,
                        data: formattedText,
                        margin: 0,
                        qrOptions: { errorCorrectionLevel: "H" }, 
                        image: customLogoData,
                        dotsOptions: {
                            type: dotStyle,
                            gradient: {
                                type: "linear",
                                rotation: 0.78,
                                colorStops: [{ offset: 0, color: color1 }, { offset: 1, color: color2 }]
                            }
                        },
                        imageOptions: {
                            crossOrigin: "anonymous",
                            margin: 2,
                            imageSize: logoSize, 
                            hideBackgroundDots: clearBg 
                        },
                        cornersSquareOptions: { type: "extra-rounded", color: color1 },
                        backgroundOptions: { color: "#ffffff" }
                    });

                    qrCode.append(qrContainer);
                    currentLabelCount++;
                }
                printArea.appendChild(pageDiv);
            }
        }

        window.onload = genererPlanche;
    </script>

</body>
</html>
