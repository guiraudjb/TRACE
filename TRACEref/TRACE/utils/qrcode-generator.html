<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur QR Pro - Coins & Découpe</title>
    <script src="./qr-code-styling.js"></script>
    <style>
        :root { --blue-france: #000091; --bg-main: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- PANNEAU DE CONTRÔLE --- */
        .admin-panel {
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .section { border-top: 4px solid var(--blue-france); padding-top: 15px; }
        .section h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--blue-france); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .field-row { display: flex; flex-direction: row; align-items: center; gap: 8px; margin-bottom: 12px; }
        label { font-size: 0.82rem; font-weight: 600; color: #555; cursor: pointer; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.85rem; }
        input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        
        .color-group { display: flex; gap: 5px; align-items: center; }
        .color-group input[type="text"] { width: 85px; text-transform: uppercase; font-family: monospace; }
        input[type="color"] { width: 30px; height: 30px; padding: 0; border: none; cursor: pointer; background: none; }

        .full-width { grid-column: 1 / -1; display: flex; justify-content: center; gap: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        button { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; }
        .btn-gen { background: var(--blue-france); color: white; }
        .btn-print { background: #2e7d32; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); opacity: 0.9; }

        /* --- RENDU --- */
        #printArea { display: flex; flex-direction: column; gap: 20px; }
        .page-a4 {
            background: white; width: 210mm; height: 297mm;
            display: grid; box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); page-break-after: always;
            overflow: hidden;
        }
        
        /* Style des étiquettes */
        .label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; overflow: hidden; padding: 1mm;
            /* Repère très léger à l'écran par défaut (invisible à l'impression) */
            outline: 1px dashed #e8e8e8; outline-offset: -1px;
        }

        /* Classe ajoutée si l'option "Pointillés" est cochée */
        .label.show-cut-lines { outline: 1px dashed #888; }

        .label-row { display: flex; flex-direction: row; align-items: center; justify-content: space-around; width: 100%; height: 85%; }
        .logo-box { display: flex; align-items: center; justify-content: center; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .label-text { margin-top: 1mm; font-family: monospace; font-weight: bold; text-align: center; }

        /* --- RÈGLES D'IMPRESSION --- */
        @media print {
            body { background: white; padding: 0; }
            .admin-panel { display: none !important; }
            .page-a4 { box-shadow: none; margin: 0; }
            
            /* Supprime les repères d'écran */
            .label { outline: none; }
            /* Force l'affichage des pointillés légers si l'option est cochée */
            .label.show-cut-lines { outline: 0.5pt dashed #999 !important; }
            
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <div class="section">
            <h3>1. Contenu</h3>
            <div class="field"><label>Préfixe</label><input type="text" id="prefix" value="MOB-"></div>
            <div class="field">
                <label>Départ / Quantité</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="start" value="1" style="width:50%">
                    <input type="number" id="qty" value="40" style="width:50%">
                </div>
            </div>
            <div class="field">
                <label>Correction d'erreur</label>
                <select id="ecc">
                    <option value="L">L (7%)</option><option value="M">M (15%)</option>
                    <option value="Q">Q (25%)</option><option value="H" selected>H (30%)</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h3>2. Corps & Fond</h3>
            <div class="field">
                <label>Forme des points</label>
                <select id="dotType">
                    <option value="square">Carré</option><option value="rounded">Arrondi</option>
                    <option value="dots" selected>Points</option><option value="classy">Élégant</option>
                    <option value="extra-rounded">Gouttes</option>
                </select>
            </div>
            <div class="field">
                <label>Dégradé (Début / Fin)</label>
                <div class="color-group">
<input type="color" id="c1p" value="#004225">
<input type="text" id="c1h" value="#004225">

<input type="color" id="c2p" value="#007638">
<input type="text" id="c2h" value="#007638">
                </div>
            </div>
            <div class="field">
                <label>Type & Rotation Dégradé (rad)</label>
                <div style="display:flex; gap:5px">
                    <select id="gradType" style="width:60%"><option value="linear">Linéaire</option><option value="radial">Radial</option></select>
                    <input type="number" id="gradRot" value="0.78" step="0.1" style="width:40%">
                </div>
            </div>
            <div class="field" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee;">
                <label>Couleur de Fond</label>
                <div class="color-group"><input type="color" id="bgP" value="#ffffff"><input type="text" id="bgH" value="#ffffff"></div>
                <div class="field-row" style="margin-top:5px;"><input type="checkbox" id="bgTrans"><label for="bgTrans">Fond Transparent</label></div>
            </div>
        </div>

        <div class="section">
            <h3>3. Yeux & Logo</h3>
            <div class="field">
                <label>Forme Yeux (Contour / Centre)</label>
                <div style="display:flex; gap:5px">
                    <select id="corSq" style="width:50%"><option value="square">Carré</option><option value="extra-rounded" selected>Arrondi</option><option value="dot">Cercle</option></select>
                    <select id="corDt" style="width:50%"><option value="square">Carré</option><option value="dot" selected>Cercle</option></select>
                </div>
            </div>
            <div class="field">
                <label>Couleur Yeux (Contour / Centre)</label>
                <div class="color-group">
                    <input type="color" id="cEqP" value="#004225">
<input type="text" id="cEqH" value="#004225">

<input type="color" id="cDtP" value="#007638">
<input type="text" id="cDtH" value="#007638">
                </div>
            </div>
            <div class="field" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee;">
                <label>Logo (Fichier .png/.jpg)</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
            <div class="field">
                <label>Options d'incrustation</label>
                <select id="logoPos" style="margin-bottom: 5px;">
                    <option value="embedded">Incrusté au centre</option>
                    <option value="left">À gauche du QR</option>
                </select>
                <div class="field-row">
                    <input type="checkbox" id="hideDots" checked>
                    <label for="hideDots">Masquer les points sous le logo</label>
                </div>
                <div style="display:flex; gap:5px; margin-top: 5px;">
                    <input type="number" id="logoSize" value="0.3" step="0.05" style="width:50%" title="Echelle (Ex: 0.3)">
                    <input type="number" id="logoMargin" value="2" style="width:50%" title="Marge (Ex: 2)">
                </div>
            </div>
        </div>

        <div class="section">
            <h3>4. Gabarit d'Impression (mm)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="field"><label>Marge Haut ↑</label><input type="number" id="mTop" value="19"></div>
                <div class="field"><label>Marge Bas ↓</label><input type="number" id="mBottom" value="19"></div>
                <div class="field"><label>Marge Gauche ←</label><input type="number" id="mLeft" value="12.5"></div>
                <div class="field"><label>Marge Droite →</label><input type="number" id="mRight" value="12.5"></div>
            </div>
            <div class="field">
                <label>Colonnes / Lignes par page</label>
                <div style="display:flex; gap:5px">
                    <input type="number" id="nbCols" value="4">
                    <input type="number" id="nbRows" value="5">
                </div>
            </div>
            <div class="field-row">
                <input type="checkbox" id="cutLines">
                <label for="cutLines">Imprimer les traits de découpe</label>
            </div>
        </div>

        <div class="full-width">
            <button class="btn-gen" onclick="genererPlanche()">Générer la planche</button>
            <button class="btn-print" onclick="window.print()">Imprimer</button>
        </div>
    </div>

    <div id="printArea"></div>

    <script>
        let logoData = "../dsfr-v1.14.3/dist/favicon/apple-touch-icon.png"; // Logo Marianne par défaut si dispo

        // Fonction utilitaire pour synchroniser le ColorPicker et le champ Texte (Hex)
        function setupColor(pId, hId) {
            const p = document.getElementById(pId); const h = document.getElementById(hId);
            p.addEventListener('input', () => h.value = p.value.toUpperCase());
            h.addEventListener('input', () => { if(/^#[0-9A-F]{6}$/i.test(h.value)) p.value = h.value; });
        }
        
        setupColor('c1p', 'c1h'); 
        setupColor('c2p', 'c2h');
        setupColor('bgP', 'bgH');
        setupColor('cEqP', 'cEqH');
        setupColor('cDtP', 'cDtH');

        // Chargement du fichier Logo personnalisé
        document.getElementById('logoFile').addEventListener('change', function(e) {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (ev) => { logoData = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        });

        async function genererPlanche() {
            const area = document.getElementById('printArea'); area.innerHTML = '';
            
            const cfg = {
                cols: parseInt(document.getElementById('nbCols').value),
                rows: parseInt(document.getElementById('nbRows').value),
                mTop: parseFloat(document.getElementById('mTop').value),
                mBottom: parseFloat(document.getElementById('mBottom').value),
                mLeft: parseFloat(document.getElementById('mLeft').value),
                mRight: parseFloat(document.getElementById('mRight').value),
                qty: parseInt(document.getElementById('qty').value),
                start: parseInt(document.getElementById('start').value),
                prefix: document.getElementById('prefix').value,
                
                logoPos: document.getElementById('logoPos').value,
                lSize: parseFloat(document.getElementById('logoSize').value),
                lMarg: parseInt(document.getElementById('logoMargin').value),
                hideDots: document.getElementById('hideDots').checked,
                
                c1: document.getElementById('c1h').value,
                c2: document.getElementById('c2h').value,
                corSqCol: document.getElementById('cEqH').value,
                corDtCol: document.getElementById('cDtH').value,
                bgColor: document.getElementById('bgH').value,
                bgTrans: document.getElementById('bgTrans').checked,
                
                dotT: document.getElementById('dotType').value,
                gradT: document.getElementById('gradType').value,
                gradR: parseFloat(document.getElementById('gradRot').value),
                corS: document.getElementById('corSq').value,
                corD: document.getElementById('corDt').value,
                
                ecc: document.getElementById('ecc').value,
                showCutLines: document.getElementById('cutLines').checked
            };

            const availW = 210 - (cfg.mLeft + cfg.mRight);
            const availH = 297 - (cfg.mTop + cfg.mBottom);
            const cellW = availW / cfg.cols;
            const cellH = availH / cfg.rows;

            let count = 0;
            const pagesNeeded = Math.ceil(cfg.qty / (cfg.cols * cfg.rows));

            for (let p = 0; p < pagesNeeded; p++) {
                const page = document.createElement('div');
                page.className = 'page-a4';
                // Si fond transparent, on force le blanc sur la page A4 (le QR lui sera transparent)
                page.style.backgroundColor = 'white'; 
                page.style.padding = `${cfg.mTop}mm ${cfg.mRight}mm ${cfg.mBottom}mm ${cfg.mLeft}mm`;
                page.style.gridTemplateColumns = `repeat(${cfg.cols}, ${cellW}mm)`;
                page.style.gridTemplateRows = `repeat(${cfg.rows}, ${cellH}mm)`;
                
                for (let i = 0; i < (cfg.cols * cfg.rows) && count < cfg.qty; i++) {
                    const val = cfg.prefix + String(cfg.start + count).padStart(6, '0');
                    const label = document.createElement('div');
                    label.className = 'label';
                    
                    if (cfg.showCutLines) { label.classList.add('show-cut-lines'); }

                    label.style.width = `${cellW}mm`; label.style.height = `${cellH}mm`;
                    
                    let qrCont = document.createElement('div');
                    let qrSizePx;

                    // Choix de la disposition selon la position du logo
                    if (cfg.logoPos === 'left') {
                        const row = document.createElement('div');
                        row.className = 'label-row';
                        const lb = document.createElement('div'); lb.className = 'logo-box';
                        lb.style.width = '35%'; 
                        const img = document.createElement('img'); img.src = logoData;
                        lb.appendChild(img);
                        const qb = document.createElement('div'); qb.style.width = '60%';
                        qb.appendChild(qrCont);
                        row.appendChild(lb); row.appendChild(qb);
                        label.appendChild(row);
                        qrSizePx = Math.round((cellW * 0.55) * 3.78); // Convertir mm en pixels approximatifs
                    } else {
                        label.appendChild(qrCont);
                        qrSizePx = Math.round(Math.min(cellW, cellH) * 0.75 * 3.78);
                    }

                    const txt = document.createElement('div');
                    txt.className = 'label-text';
                    txt.style.fontSize = `7.5pt`;
                    txt.innerText = val;
                    label.appendChild(txt);
                    page.appendChild(label);

                    // Configuration exhaustive de QRCodeStyling
                    const qrParams = {
                        width: qrSizePx, height: qrSizePx, data: val,
                        qrOptions: { errorCorrectionLevel: cfg.ecc },
                        backgroundOptions: { 
                            // Utilise transparent si coché, sinon la couleur choisie
                            color: cfg.bgTrans ? "transparent" : cfg.bgColor 
                        },
                        dotsOptions: {
                            type: cfg.dotT,
                            gradient: { 
                                type: cfg.gradT, 
                                rotation: cfg.gradR, 
                                colorStops: [{ offset: 0, color: cfg.c1 }, { offset: 1, color: cfg.c2 }] 
                            }
                        },
                        cornersSquareOptions: { 
                            type: cfg.corS, 
                            color: cfg.corSqCol // Couleur spécifique pour le contour de l'œil
                        },
                        cornersDotOptions: { 
                            type: cfg.corD, 
                            color: cfg.corDtCol // Couleur spécifique pour le centre de l'œil
                        }
                    };

                    if (cfg.logoPos === 'embedded') {
                        qrParams.image = logoData;
                        qrParams.imageOptions = { 
                            imageSize: cfg.lSize, 
                            margin: cfg.lMarg, 
                            hideBackgroundDots: cfg.hideDots // Contrôle de l'évidement central
                        };
                    }

                    new QRCodeStyling(qrParams).append(qrCont);
                    count++;
                }
                area.appendChild(page);
            }
        }
        
        window.onload = genererPlanche;
    </script>
</body>
</html>
